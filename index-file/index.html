<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
      <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">   
    <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
     <!-- telwind and daisyui css -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
      <!-- style -->
     <style>
        *{
             font-family: "Geist", sans-serif;
        }
     </style>
</head>
<body>
    <section>
        <div class="hero bg-base-200 min-h-screen">
     <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
        <div class="text-center content-center">
            <img class="w-3/12 m-auto" src="./assets/github-logo.png" alt="">
            <h3 class="text-[24px] font-semibold">GitHub Issues Tracker</h3>
            <p class=" text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset">
          <label  class=" label text-[#1F2937] font-bold text-[14px]">Username</label>
          <input id="username" type="text" class="input" placeholder="Enter Username" />
          <p class="text-[#4A00FF]">Default: admin</p>
          <label  class=" label text-[#1F2937] font-bold text-[14px]">Password</label>
          <input id="password" type="password" class="input" placeholder="Enter Password" />
          <p class="text-[#4A00FF]">Default: admin123</p>
          <a href=""></a>
          <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </div>
</div>
    </section>

    <script src="./login.js"></script>
</body>
</html>
