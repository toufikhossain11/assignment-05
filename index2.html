<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
      <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">   
    <!-- icon -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
     <!-- telwind and daisyui css -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
      <!-- style -->
     <style>
        *{
             font-family: "Geist", sans-serif;
        }
     </style>
</head>
<body>
  <!-- navbar -->
    <header>
 <div class="navbar bg-base-200 shadow-sm justify-between mb-[30px] items-center">
  <div class="flex gap-3 text-center">
    <img class="w-9" src="./assets/github-logo.png" alt="">
    <h2 class="cursor-pointer text-2xl font-semibold">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input id="searchInput" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
       <button onclick="searchIssue()" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
        </div>
         </div>
      </div>
    </header>
  <!-- toggle-btn -->
    <section>
      <div class="navbar gap-3  bg-base-200 shadow-sm w-11/12 m-auto">
        <button id="tab-all" onclick="allTab()" class="btn  px-8">All</button>
        <button id="tab-open" onclick="openTab()" class="btn  px-6">Open</button>
        <button id="tab-close" onclick="closeTab()" class="btn  px-5">Closed</button>
      </div>
    </section>
 <!-- count-btn -->
    <section>
      <div class="w-11/12 navbar bg-base-200 shadow-sm justify-between mt-[20px] m-auto ">
        <div class="flex items-center gap-3 justify-center">
          <img class="btn btn-circle btn-lg w-[40px] h-[40px]" src="./assets/Aperture.png" alt="">
        <div>
          <h4 class="text-[20px] font-semibold">
          <span id="count-number">0</span> Issues</h4>
          <p class="text-[#64748B] text-[14px]">Track and manage your project issues</p>
        </div>
        </div>
        <div class="flex gap-2 items-center">
          <i class="text-green-500 fa-solid fa-circle text-[10px]"></i>
          <p>Open</p>
          <i class="text-orange-600 fa-solid fa-circle text-[10px]"></i>
          <p>Closed</p>
        </div>
      </div>

    </section>

    <section>
      <div id="loading" class="hidden text-center mt-5">
        <span class="loading loading-spinner loading-xl"></span>
      </div>

    </section>
    <!-- card -->
    <section id="card-contener" class="w-11/12 navbar bg-base-200 shadow-sm m-auto mt-2 gap-5 grid lg:grid-cols-4 md:grid-cols-2 sm:grid-cols-1 ">
    </section>

    <!-- modal -->
     <section class="">
      <dialog id="my_modal_1" class="modal">
        <div id="modal-continar"></div>
      </dialog>
     </section>
     <script src="./script-js/main-page.js"></script>
</body>
</html>
